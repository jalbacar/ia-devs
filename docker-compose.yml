services:
  # --- Entorno Python con LangChain para el Módulo 5 ---
  llm-dev:
    image: python:3.12-slim
    container_name: llm-dev
    working_dir: /workspaces/ia-devs
    volumes:
      - .:/workspaces/ia-devs:cached
    ports:
      - "8888:8888"   # Jupyter
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --notebook-dir=/workspaces/ia-devs/workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

  # --- Base de datos (Módulo 5: LLMOps, vectores) ---
  postgres:
    image: postgres:16-alpine
    container_name: llm-db
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: llmdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --- Ollama: LLM local gratuito para prácticas offline ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    command: serve

volumes:
  pgdata:
  ollama: